en:{name:"Nan Yao",short:"Nan",eyebrow:"AI · Venture · Product · VC Ecosystem",title:"Builder-operator working across AI, venture, product thinking, and ecosystem-facing execution.",about:"I work around the AI and venture ecosystem, connecting market research, product judgment, founder-facing narratives, and repeatable execution. My strength is turning scattered signals into clear questions, useful systems, and communication that helps teams move.",open:"Open to roles across AI, product, venture platform, VC research, investment operations, and ecosystem-building teams",nav:["Experience","Work","Focus","Education","Skills","Contact","CV","Email","View project"],mail:"yaonan1127@gmail.com",linkedin:"https://www.linkedin.com/in/yaonanstarry",metrics:[["AI & Product","Markets, users, workflows, adoption, agent boundaries"],["Venture Context","Startup tracking, market maps, founder and investor narratives"],["Execution","Project management, research systems, collaboration, tech ethics"]],focus:[[ "Product judgment grounded in market context","I connect startup tracking, investor context, product testing, and user scenarios to understand where new technologies can become durable workflows rather than short-lived novelty."],["AI workflows and trust design","I think carefully about when an agent should act, ask, summarize, escalate, or stop; confidence thresholds, traceable records, fallback paths, and kill switches are part of the product experience."],["Systems that scale judgment","I build SOPs, editorial systems, research pipelines, event workflows, and feedback loops so good judgment becomes easier for teams to repeat."]],projects:[["Asana Challenge - Adaptive Sync","AI product case","PMs and cross-functional teams lose context across Slack, Jira, and Asana. I framed the problem as status drift plus late risk discovery, then designed an AI collaboration layer that detects tasks, owners, deadlines, blockers, and risk patterns from Slack and syncs them back into Asana.","Feb. 2026 - May 2026","",1,["User groups: PMs, team leads, and cross-functional contributors.","Core flow: detect tasks, generate Asana project structures, sync comments/status, and surface repeated blockers.","Expanded the concept into PM-ready artifacts: problem framing, JTBD, entity extraction logic, sync rules, risk signals, and adoption path.","Product principle: no new tools and no new habits; AI supports the current collaboration surface.","Safety and adoption: onboarding, permissions, audit logs, human-in-the-loop edits, fallback states, and user education."]],["Apexon Agent Challenge","AI workflow case","I mapped enterprise delivery work where agents can reduce coordination drag without becoming opaque decision-makers: status collection, meeting summaries, weekly reports, reminders, and action-item follow-up.","May 2026","",1,["Defined what the agent should and should not do across delivery scenarios.","Separated low-risk automation, human-review moments, and escalation points so the agent behaves like a reliable teammate rather than a black box.","Designed confidence thresholds, traceable records, fallback handling, and kill switch logic.","Turned agent behavior into an operational framework teams can discuss, evaluate, and govern."]],["Wavo! AI Open Course Program","AI education project","Co-led a public AI education initiative for non-technical learners, coordinating partners including Volcano Engine, ZhenFund, Zhipu AI, and Devv.ai.","Oct. 2024 - Dec. 2024","https://mp.weixin.qq.com/s/0VYOR1ZFb41HbA2wt7oznQ",0,["Owned project coordination and public-facing communication with the team.","Helped convert AI product concepts into approachable learning material, reducing jargon while keeping the product logic intact.","Balanced partner needs, learner clarity, and program execution rhythm.","Strength shown: cross-stakeholder coordination, audience translation, and reliable delivery under a public program timeline."]],["Waves Odyssey","Market research project","Supported overseas-expansion research through market analysis, itinerary design, participant screening, and promotional visuals.","Jul. 2024 - Aug. 2024","https://mp.weixin.qq.com/s/zEojryWXUlqI9le5rpOWgA",0,["Researched market and participant context to understand business goals, user profiles, and communication angles.","Connected itinerary design with research objectives so the project was not only event-like, but also insight-oriented.","Supported project material design and execution coordination.","Kept the original project as part of the portfolio archive."]]],jobs:[["Oct. 2025 - Present","Beijing, China","Monolith Capital","Investment Operations Intern",["AI startup tracking","Investment research","Product intelligence"],"Builds a structured AI investment research layer for early-stage decision-making, turning noisy company, product, financing, team, customer, and technical-route signals into comparable market intelligence.",["Designed a multi-dimensional tagging system across company stage, financing status, product category, team background, market segment, technology route, and observable traction.","Maintains a bilingual research pipeline across foundation models, AI agents, AI-native tools, and workflow products, with attention to source credibility, update cadence, and signal decay.","Turns scattered external information into watchlists, market maps, competitive notes, product-positioning memos, trend briefs, and research SOPs.","Strength shown: combines venture sensing, product literacy, and information architecture to support faster screening and sharper investment discussion."]],["Apr. 2025 - Sep. 2025","Shanghai, China","Crossing, AI Media Startup","Content Editor Intern",["AI media","Editorial operations","Product research"],"Translated fast-moving AI product and startup topics into credible, readable editorial products for founders, investors, operators, and technical audiences, balancing speed, accuracy, and narrative clarity.",["Created newsletters, WeChat deep dives, podcast companion articles, and AI company/product research notes across product launches, funding signals, founder stories, and market debates.","Standardized topic selection, source verification, fact-checking, review, layout, and publishing workflows to reduce repeated rework and improve editorial consistency.","Used audience feedback and editorial performance to refine angles, packaging, and follow-up topics instead of treating content as one-off output.","Improved team production efficiency by about 40% through review templates, clearer ownership, and tighter collaboration checkpoints."]],["Nov. 2024 - Apr. 2025","Shanghai, China","Linear Capital","Marketing Operations Intern",["Venture platform","Brand operations","Events"],"Converted AI investment themes into founder-facing content and platform operations, connecting market sensing, narrative packaging, partner coordination, and event execution.",["Tracked AI themes from YC, a16z founder podcasts, founder interviews, and industry research to support content and community programming.","Converted fragmented external signals into original content, internal knowledge notes, founder-facing materials, and investor communication context.","Supported a 100+ participant Demo Day across process design, partner coordination, material preparation, on-site execution, and post-event review.","Strength shown: bridges research, brand, community, and operations in venture-facing scenarios where details and timing both matter."]],["Jun. 2024 - Oct. 2024","Beijing, China","36Kr - Anyong Waves","Media Operations Intern",["Growth content","AI startups","SOP"],"Operated AI venture content as a measurable growth system, connecting founder stories, financing signals, audience feedback, and channel data into repeatable content operations.",["Grew the Rednote channel to 10,000+ followers; top post reached 400K+ views and 3,000+ interactions.","Supported topic planning around AI startups, VC deal flow, founder stories, and emerging technology narratives, turning market signals into audience-readable angles.","Built SOPs and tracking sheets for topic selection, publishing cadence, post-performance review, and account data management.","Strength shown: combines content judgment, growth feedback, and process discipline to make media operations more repeatable."]]],edu:[["2025 - Present","New York University","M.S. in Project Management · CGPA 4.0/4.0 · focus on AI product implementation, organizational collaboration, and technology ethics"],["2021 - 2025","BNU-HKBU United International College","B.A. in Public Relations & Advertising · Second-Class Scholarship · 2025 Diamond Award Medal"],["Summer 2024","The University of Hong Kong","Summer Institute · Outstanding Performance · First Place Prize"],["Summer 2023","University of Edinburgh","Summer School · Business Communication and Social Media"]],skills:[["AI and research tools",["DeepSeek","ChatGPT","Claude","Gemini","NotebookLM","Cursor","Perplexity","Manus","Midjourney"]],["Product, research, and operations",["User scenario mapping","Journey design","SOP design","Feedback loops","Data tracking","FAQ/help docs"]],["AI and product methods",["Prompt design","Workflow decomposition","Competitive product testing","Agent boundary design","Risk/fallback planning"]],["General tools and languages",["Excel","PowerPoint","Notion","Figma","Canva","Photoshop","Mandarin native","English IELTS 7.0"]]]},

let lang="en";try{lang=window.localStorage?.getItem("nanyao-lang")||"en"}catch(e){};const app=document.getElementById("app");

function contactButtons(t,n){return `<a class="btn primary" href="mailto:${t.mail}"><span class="icon">@</span>${n[7]}</a><a class="btn" href="${t.linkedin}" target="_blank" rel="noopener"><img class="icon" src="${LINKEDIN_IMG}" alt="">LinkedIn</a><a class="btn" href="${CV}" target="_blank" rel="noopener">📄 ${n[6]}</a>`}
function render(){const t=D[lang],n=t.nav;document.documentElement.lang=lang==="zh"?"zh-CN":"en";app.innerHTML=`<nav class="nav"><div class="shell navin"><a class="brand" href="#">${t.short}</a><div class="links"><a href="#experience">${n[0]}</a><a href="#work">${n[1]}</a><a href="#focus">${n[2]}</a><a href="#education">${n[3]}</a><a href="#contact">${n[5]}</a></div><div class="actions"><a class="btn" href="${CV}" target="_blank" rel="noopener">📄 ${n[6]}</a><button class="btn primary" onclick="toggleLang()">${lang==="en"?"中文":"EN"}</button></div></div></nav>
<header class="hero"><div class="shell heroGrid"><section class="reveal"><p class="eyebrow">${t.eyebrow}</p><h1>${t.name}</h1><p class="lead">${t.title}</p><p class="copy">${t.about}</p><div class="row">${contactButtons(t,n)}</div><div class="metrics">${t.metrics.map(m=>`<div class="metric"><b>${m[0]}</b><span>${m[1]}</span></div>`).join("")}</div></section><aside class="portraitCard reveal"><div class="portrait"><img src="${IMG}" alt="${t.name}"></div></aside></div></header>
<main class="shell"><section class="section" id="experience"><div class="sectionHead reveal"><p class="label">${n[0]}</p><div><h2>${lang==="en"?"Working across AI, venture, product judgment, and operating systems.":"在 AI、创投、产品判断与运营系统之间工作。"}</h2><p>${lang==="en"?"Each role strengthened a different layer of my judgment: market sensing, product thinking, founder-facing narrative, research infrastructure, and repeatable execution.":"每段经历都补强了我判断力的不同层面：市场感知、产品思考、面向创始人和用户的表达、研究基础设施，以及可复用的执行机制。"}</p></div></div><div class="workList"><div class="timelineArrow" aria-hidden="true">↓</div>${t.jobs.map(jobCard).join("")}</div></section>
<section class="section" id="work"><div class="sectionHead reveal"><p class="label">${n[1]}</p><div><h2>${lang==="en"?"Selected work":"代表作品"}</h2><p>${lang==="en"?"Projects that show how I frame ambiguous problems, design workflows, and translate technology or market signals into usable outputs.":"这些项目展示我如何定义模糊问题、设计工作流，并把技术或市场信号转成更可使用的输出。"}</p></div></div><div class="grid2">${t.projects.map((p,i)=>`<article class="project ${p[5]&&i===0?"featured":""} tone${i} reveal" style="--i:${i}"><div><p class="meta">${p[1]} · ${p[3]}</p><h3>${p[0]}</h3><p>${p[2]}</p>${lis(p[6])}</div>${p[4]?`<a class="plink" href="${p[4]}" target="_blank" rel="noopener">${n[8]} →</a>`:""}</article>`).join("")}</div></section>
<section class="section" id="focus"><div class="sectionHead reveal"><p class="label">${n[2]}</p><div><h2>${lang==="en"?"How I think about work in the AI ecosystem":"我如何理解 AI 生态里的工作"}</h2><p>${lang==="en"?"Useful work in the AI ecosystem needs more than model capability. It needs market context, crisp scenarios, trust design, and execution that makes adoption easier.":"AI 生态里的有价值工作不只需要模型能力，也需要市场语境、清晰场景、信任设计，以及能推动采用的执行机制。"}</p></div></div><div class="grid3">${t.focus.map(f=>`<article class="focus reveal"><h3>${f[0]}</h3><p>${f[1]}</p></article>`).join("")}</div></section>
<section class="section two"><div id="education"><div class="sectionHead reveal"><p class="label">${n[3]}</p><div><h2>${lang==="en"?"Education":"教育背景"}</h2></div></div><div class="list">${t.edu.map(e=>`<article class="item reveal"><p class="period">${e[0]}</p><h3>${e[1]}</h3><p>${e[2]}</p></article>`).join("")}</div></div><div id="skills"><div class="sectionHead reveal"><p class="label">${n[4]}</p><div><h2>${lang==="en"?"Skills":"能力栈"}</h2></div></div><div class="list">${t.skills.map(s=>`<article class="item reveal"><h3>${s[0]}</h3><div class="skillTags">${s[1].map(x=>`<span>${x}</span>`).join("")}</div></article>`).join("")}</div></div></section></main>
<footer class="footer" id="contact"><div class="shell foot"><div><h2>${lang==="en"?"Let’s build useful AI workflows.":"一起搭建真正有用的 AI 工作流。"}</h2><p>${t.mail}${lang==="zh"?" · 微信 "+t.wechat:""}</p></div><div class="row">${contactButtons(t,n)}</div></div></footer>`;requestAnimationFrame(()=>{let ob=new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("visible");ob.unobserve(e.target)}}),{threshold:.12});document.querySelectorAll(".reveal").forEach(x=>ob.observe(x))})}
